# JunoClaw Genesis Bud Handover — Secrets Template
# Fill this out per recipient. Seal with: bud-seal seal --to <name>.pub --file <name>-secrets.toml
# NEVER commit the filled version. Only .sealed files should be transmitted.

[recipient]
name = "Dimi"
juno_address = "juno1..."        # their testnet (uni-7) address
bud_number = 1                    # 1-13
depth = 1                         # always 1 for genesis buds

[governance]
# On-chain governance — granted via WeightChange proposal
voting_weight = 1
can_propose = true
can_bud_once = true

# ─────────────────────────────────────────────────
# ROOT RING ONLY (depth 1) — Infra co-stewardship
# ─────────────────────────────────────────────────

[infra.github]
org = "Dragonmonk111"
repo = "junoclaw"
access_level = "collaborator (write)"

[infra.testnet]
chain_id = "uni-7"
rpc = "https://juno-testnet-rpc.polkachu.com"
api = "https://juno-testnet-api.polkachu.com"

# Shared deploy wallet — created fresh for Root Ring ops
# NOT the mother wallet. NOT personal wallets.
deploy_wallet_address = "juno1..."
deploy_wallet_mnemonic = "FILL_BEFORE_SEALING"

[infra.contracts]
agent_company = "juno1k8dxll425mcclacaxhrmkx9w5pznx9w5ggmw53tpj0c009ngfnjstj85k6"
agent_registry = ""
escrow = ""
task_ledger = ""
junoswap_factory = "juno12v0t60msclf3hcj56clrnh575ct35clglqunr489aj0xsvawghvq3wtkkh"

[infra.server]
# SSH access — dedicated user per bud, no root sharing
host = "FILL_BEFORE_SEALING"
port = 22
username = "FILL_PER_RECIPIENT"
ssh_public_key_required = true
# Recipient adds their SSH pubkey; sender creates the user on the server

[infra.akash]
# Akash deployment credentials (if needed)
provider_wallet = "FILL_BEFORE_SEALING"
sdl_repo_path = "wavs/akash.sdl.yml"

# ─────────────────────────────────────────────────
# BRANCH BUDS (depth 2+) get NONE of the [infra] section.
# They receive only the [recipient] and [governance] blocks.
# ─────────────────────────────────────────────────
