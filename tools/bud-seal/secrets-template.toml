# JunoClaw Genesis Bud Handover — Secrets Template
#
# CHAIN OF CUSTODY:
#   Genesis seals bud #1's package.
#   Bud #1 seals bud #2's package.
#   Bud #N seals bud #(N+1)'s package.
#   Each bud holder is responsible for onboarding the next.
#
# WORKFLOW:
#   1. Copy this template → <name>-secrets.toml
#   2. Fill in all FILL_* placeholders
#   3. Seal:  bud-seal seal --to <name>.pub --file <name>-secrets.toml
#   4. Transmit the .sealed file to the recipient (DM, encrypted channel, etc.)
#   5. Recipient opens: bud-seal open --key <name>.key --file <name>-secrets.toml.sealed
#   6. DELETE the plaintext .toml after sealing. Only .sealed files should exist.
#
# NEVER commit filled secrets. The .gitignore protects *.sealed and *-secrets.toml.

[recipient]
name = "FILL_RECIPIENT_NAME"
juno_address = "FILL_JUNO1_ADDRESS"     # their testnet (uni-7) address
bud_number = 0                           # 1-13 for genesis buds
depth = 1                                # always 1 for genesis buds
sealed_by = "FILL_SENDER_NAME"           # who sealed this package (genesis or bud #N)

[governance]
# On-chain governance — granted via WeightChange proposal
voting_weight = 1
can_propose = true
can_bud_once = true                      # each bud holder passes the next bud

# ─────────────────────────────────────────────────
# THE 13 ONLY (depth 1) — Infra co-stewardship
# ─────────────────────────────────────────────────

[infra.github]
org = "Dragonmonk111"
repo = "junoclaw"
access_level = "collaborator (write)"

[infra.testnet]
chain_id = "uni-7"
rpc = "https://juno-testnet-rpc.polkachu.com"
api = "https://juno-testnet-api.polkachu.com"

# Shared deploy wallet — created fresh for the 13's operations
# NOT the genesis mother wallet. NOT personal wallets.
deploy_wallet_address = "FILL_DEPLOY_ADDRESS"
deploy_wallet_mnemonic = "FILL_BEFORE_SEALING"

[infra.contracts]
agent_company = "juno1k8dxll425mcclacaxhrmkx9w5pznx9w5ggmw53tpj0c009ngfnjstj85k6"
agent_registry = ""
escrow = ""
task_ledger = ""
junoswap_factory = "juno12v0t60msclf3hcj56clrnh575ct35clglqunr489aj0xsvawghvq3wtkkh"

[infra.server]
# SSH access — dedicated user per bud, no root sharing
host = "FILL_BEFORE_SEALING"
port = 22
username = "FILL_PER_RECIPIENT"
ssh_public_key_required = true
# Recipient adds their SSH pubkey; sender creates the user on the server

[infra.akash]
# Akash deployment credentials (if needed)
provider_wallet = "FILL_BEFORE_SEALING"
sdl_repo_path = "wavs/akash.sdl.yml"

# ─────────────────────────────────────────────────
# BRANCH BUDS (depth 2+) get NONE of the [infra] section.
# They receive only the [recipient] and [governance] blocks.
# ─────────────────────────────────────────────────
