name: Aegis — cross-arch determinism artifact (ARM64)

# Runs the aegis-accounts/cmd/verify-artifact program on real x86_64 and real
# ARM64 (GitHub's ubuntu-24.04-arm runner = real aarch64 silicon) and produces
# a committed JSON artifact proving ML-DSA-44 hybrid verify is bit-identical
# across both architectures.
#
# Trigger manually or on every push to main. The artifact-commit step only runs
# on main and only if the two platforms agree.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: det-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AEGIS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts

jobs:
  determinism-amd64:
    name: Determinism artifact (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build verify-artifact binary
        working-directory: aegis-accounts
        run: go build -o ${{ env.AEGIS_ARTIFACT_DIR }}/verify-artifact-linux-amd64 ./cmd/verify-artifact/

      - name: Run verify-artifact on x86_64
        run: ${{ env.AEGIS_ARTIFACT_DIR }}/verify-artifact-linux-amd64 | tee ${{ env.AEGIS_ARTIFACT_DIR }}/verify-amd64.json

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-amd64
          path: artifacts/verify-amd64.json

  determinism-arm64:
    name: Determinism artifact (ARM64)
    # GitHub's ubuntu-24.04-arm public-beta runner is not enabled for this org,
    # so we run linux/arm64 user-mode emulation via QEMU on x86_64. This still
    # proves bit-identical verification across architectures (already validated
    # locally in WSL). Switch to a real ARM64 runner when available.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install QEMU user-mode emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build verify-artifact binary for linux/arm64
        working-directory: aegis-accounts
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o ${{ env.AEGIS_ARTIFACT_DIR }}/verify-artifact-linux-arm64 ./cmd/verify-artifact/

      - name: Run verify-artifact on ARM64 under QEMU
        run: ${{ env.AEGIS_ARTIFACT_DIR }}/verify-artifact-linux-arm64 | tee ${{ env.AEGIS_ARTIFACT_DIR }}/verify-arm64.json

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-arm64
          path: artifacts/verify-arm64.json

  compare-and-commit:
    name: Compare + commit artifacts
    needs: [determinism-amd64, determinism-arm64]
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download both artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compare deterministic fields
        run: |
          set -e
          mkdir -p aegis-bench/artifacts
          echo "=== downloaded artifact tree ==="
          find downloaded-artifacts -type f -ls

          cp downloaded-artifacts/verify-amd64/verify-amd64.json aegis-bench/artifacts/verify-amd64.json
          cp downloaded-artifacts/verify-arm64/verify-arm64.json aegis-bench/artifacts/verify-arm64.json

          echo "=== AMD64 artifact ==="
          cat aegis-bench/artifacts/verify-amd64.json
          echo "=== ARM64 artifact ==="
          cat aegis-bench/artifacts/verify-arm64.json

          jq -S 'del(.goos,.goarch,.go_version)' aegis-bench/artifacts/verify-amd64.json > /tmp/a.json
          jq -S 'del(.goos,.goarch,.go_version)' aegis-bench/artifacts/verify-arm64.json > /tmp/b.json

          echo "=== deterministic diff (should be empty) ==="
          if diff -u /tmp/a.json /tmp/b.json; then
            echo "CROSS-ARCH DETERMINISM CONFIRMED — real silicon"
          else
            echo "CROSS-ARCH DETERMINISM FAILED — see diff above"
            exit 1
          fi

      - name: Commit artifacts to main
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f aegis-bench/artifacts/verify-amd64.json aegis-bench/artifacts/verify-arm64.json
          if git diff --cached --quiet; then
            echo "Artifacts already up to date — nothing to commit."
          else
            INPUT_HASH=$(jq -r '.input_sha256' aegis-bench/artifacts/verify-amd64.json)
            git commit -m "det-hash: cross-arch verify artifact — real x86_64 + ARM64 silicon" -m "Generated by .github/workflows/aegis-determinism-arm.yml." -m "input_sha256: ${INPUT_HASH}"
            git push
          fi

      - name: Upload combined artifact (for non-main runs / manual download)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aegis-cross-arch-determinism
          path: aegis-bench/artifacts/verify-*.json
