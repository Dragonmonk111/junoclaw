name: Juno Agents DAO Heartbeat Digest

on:
  # Daily cron removed: the local block-driven watcher commits realtime
  # heartbeat digests, making the scheduled run redundant and a source of
  # push conflicts on the generated digest files. Manual dispatch is kept
  # as a fallback if the local watcher is down.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate heartbeat digest
        working-directory: ./tools/heartbeat-digest
        run: node src/index.js

      - name: Commit and push digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: daily heartbeat digest'
          file_pattern: 'tools/heartbeat-digest/digests/*.md'
          branch: ${{ github.ref }}
